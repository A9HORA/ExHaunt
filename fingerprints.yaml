# ExHaunt HTTP/TLS fingerprints for default/unbound backends
# Confidence levels: strong | medium | weak
#
# Schema per rule:
#   name        — unique identifier, shown in output
#   provider    — display name for the service
#   cname_suffix — (optional) terminal CNAME must end with this to match rule
#   status      — list of HTTP status codes to match (string, supports regex)
#   header      — list of "header-name: regex" pairs (all must match)
#   body        — list of body regex patterns (all must match)
#   tls_subject — regex matched against TLS cert subject string
#   tls_issuer  — regex matched against TLS cert issuer string
#   confidence  — strong | medium | weak
#   vulnerable  — true = confirmed takeover possible, false = not claimable
#                 (false rules still fire for context but won't promote to CONFIRMED)
#
# Sources: EdOverflow/can-i-take-over-xyz (fingerprints.json), verified 2025.
# Only "Vulnerable: true" entries are marked vulnerable: true here.
# "Not vulnerable" services included for identification context only.
# ======================================================================


# ======================================================================
# AWS
# ======================================================================

- name: aws-alb-default
  provider: AWS
  status: [ "404", "503" ]
  header:
    - "server: ^awselb/2\\.0$"
  confidence: strong
  vulnerable: false

- name: aws-s3-no-bucket
  provider: AWS/S3
  cname_suffix: ".s3.amazonaws.com"
  status: [ "404" ]
  body:
    - "The specified bucket does not exist"
  confidence: strong
  vulnerable: true

- name: aws-s3-no-bucket-xml
  provider: AWS/S3
  body:
    - "<Code>NoSuchBucket</Code>"
  confidence: strong
  vulnerable: true

- name: aws-elastic-beanstalk-nxdomain
  provider: AWS/Elastic Beanstalk
  cname_suffix: ".elasticbeanstalk.com"
  status: [ "404" ]
  body:
    - "404 Not Found"
  confidence: medium
  vulnerable: true

- name: aws-cloudfront-viewer-cert
  provider: AWS/CloudFront
  body:
    - "ViewerCertificateException"
  confidence: medium
  vulnerable: false


